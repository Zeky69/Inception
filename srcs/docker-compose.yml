services:

  mariadb:
    build:
      context: requirements/mariadb
    image: mariadb:inception
    container_name: mariadb
    networks:
      - inception-network
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    restart: always

  wordpress:
    build:
      context: requirements/wordpress
    image: wordpress:inception
    container_name: wordpress
    depends_on:
      - mariadb
      - redis
    networks:
      - inception-network
    volumes:
      - wordpress_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_TABLE_PREFIX: wp_
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
      WP_CREDENTIALS_FILE: /run/secrets/credentials
    secrets:
      - db_password
      - credentials
    restart: always

  nginx:
    build:
      context: requirements/nginx
    image: nginx:inception
    container_name: nginx
    depends_on:
      - wordpress
    networks:
      - inception-network
    volumes:
      - wordpress_data:/var/www/html
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "443:443"
    restart: always

  redis:
    build:
      context: requirements/bonus/redis
    image: redis:inception
    container_name: redis
    networks:
      - inception-network
    restart: always

  ftp:
    build:
      context: requirements/bonus/ftp
    image: ftp:inception
    container_name: ftp
    depends_on:
      - wordpress
    networks:
      - inception-network
    volumes:
      - wordpress_data:/var/www/html
    environment:
      FTP_PASSWORD_FILE: /run/secrets/ftp_password
    secrets:
      - ftp_password
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    restart: always

  website:
    build:
      context: requirements/bonus/website
    image: website:inception
    container_name: website
    networks:
      - inception-network
    ports:
      - "80:80"
    restart: always

  adminer:
    build:
      context: requirements/bonus/adminer
    image: adminer:inception
    container_name: adminer
    depends_on:
      - mariadb
    networks:
      - inception-network
    ports:
      - "8080:8080"
    restart: always

  portainer:
    build:
      context: requirements/bonus/portainer
    image: portainer:inception
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
    restart: always

networks:
  inception-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/zakburak/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/zakburak/data/wordpress
  portainer_data:
    driver: local

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
  credentials:
    file: ../secrets/credentials.txt
